name: Daily News Trigger

on:
  schedule:
    # 這裡使用的是 UTC 時間。UTC 00:00 剛好是台灣時間早上 08:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  # 1. 喚醒 Render 伺服器 (你目前的內容)
  ping-server:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render API
        run: curl https://ai-personalized-ai-news-automation.onrender.com

  # 2. 執行新聞抓取與推播 (這是你漏掉的部分)
  run-daily-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main script
        env:
          # 這裡要對應你在 GitHub Secrets 設定的名稱
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          MY_LINE_USER_ID: ${{ secrets.MY_LINE_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODLE: ${{ secrets.GEMINI_MODLE }}
        run: python main_daily_job.py
   
